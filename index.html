<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scotland Trip Weather</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 28px;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      align-items: start;
    }

    .weather-card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 12px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <h1>Scotland Trip Weather</h1>

  <div class="weather-grid">
    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d95n3d19/edinburgh/?unit=us"
         data-label_1="EDINBURGH"
         data-label_2="WEATHER"
         data-font="Arial"
         data-theme="pure">
         EDINBURGH WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d42n5d61/campbeltown/?unit=us"
         data-label_1="CAMPBELTOWN"
         data-label_2="WEATHER"
         data-font="Arial"
         data-theme="pure">
         CAMPBELTOWN WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d58n5d15/brodick/?unit=us"
         data-label_1="BRODICK"
         data-label_2="WEATHER"
         data-font="Arial"
         data-theme="pure">
         BRODICK WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/56d34n2d80/saint-andrews/?unit=us"
         data-label_1="ST ANDREWS"
         data-label_2="WEATHER"
         data-font="Arial"
         data-theme="pure">
         ST ANDREWS WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/57d41n6d20/portree/?unit=us"
         data-label_1="PORTREE"
         data-label_2="WEATHER"
         data-font="Arial"
         data-theme="pure">
         PORTREE WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/57d48n4d22/inverness/?unit=us"
         data-label_1="INVERNESS"
         data-label_2="WEATHER"
         data-font="Arial"
         data-theme="pure">
         INVERNESS WEATHER
      </a>
    </div>
  </div>

  <script>
    !function(d,s,id){
      var js,fjs=d.getElementsByTagName(s)[0];
      if(!d.getElementById(id)){
        js=d.createElement(s);
        js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
      }
    }(document,'script','weatherwidget-io-js');
  </script>
</body>
</html>
