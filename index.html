<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scotland Trip Weather</title>
  <style>
    body {
      margin: 0;
      padding: 28px 16px 40px;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #1f1f1f;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px 0;
      text-align: center;
      font-size: 2rem;
    }

    .subtitle {
      margin: 0 0 24px 0;
      text-align: center;
      color: #666;
      font-size: 1rem;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .tab-button {
      border: 1px solid #d5d5d5;
      background: #ffffff;
      color: #1f1f1f;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.06);
    }

    .tab-button.active {
      background: #1f1f1f;
      color: #ffffff;
      border-color: #1f1f1f;
    }

    .widget-card {
      background: #ffffff;
      border: 1px solid #e3e3e3;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
    }

    .city-title {
      margin: 0 0 6px 0;
      font-size: 1.4rem;
      text-align: center;
    }

    .city-subtitle {
      margin: 0 0 18px 0;
      text-align: center;
      color: #666;
      font-size: 0.95rem;
    }

    #widget-holder {
      min-height: 260px;
    }

    .forecast-link-wrap {
      margin-top: 18px;
      text-align: center;
    }

    .forecast-link {
      display: inline-block;
      text-decoration: none;
      color: #ffffff;
      background: #1f1f1f;
      padding: 11px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .forecast-link:hover {
      opacity: 0.92;
    }

    .note {
      text-align: center;
      color: #666;
      margin-top: 18px;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.65rem;
      }

      .widget-card {
        padding: 16px;
      }

      .tab-button {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Scotland Trip Weather</h1>
    <p class="subtitle">Select a city to switch the weather widget.</p>

    <div class="tabs" id="tabs"></div>

    <div class="widget-card">
      <h2 class="city-title" id="city-title">Edinburgh</h2>
      <p class="city-subtitle" id="city-subtitle">Current forecast</p>

      <div id="widget-holder"></div>

      <div class="forecast-link-wrap">
        <a
          id="forecast-link"
          class="forecast-link"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
        >
          Open full forecast
        </a>
      </div>
    </div>

    <p class="note">If the widget takes a second to update, give it a moment after clicking a tab.</p>
  </div>

  <script>
    const cities = [
      {
        name: "Edinburgh",
        url: "https://forecast7.com/en/55d95n3d19/edinburgh/?unit=us"
      },
      {
        name: "Campbeltown",
        url: "https://forecast7.com/en/55d42n5d61/campbeltown/?unit=us"
      },
      {
        name: "Brodick",
        url: "https://forecast7.com/en/55d58n5d15/brodick/?unit=us"
      },
      {
        name: "St Andrews",
        url: "https://forecast7.com/en/56d34n2d80/saint-andrews/?unit=us"
      },
      {
        name: "Portree",
        url: "https://forecast7.com/en/57d41n6d20/portree/?unit=us"
      },
      {
        name: "Inverness",
        url: "https://forecast7.com/en/57d48n4d22/inverness/?unit=us"
      }
    ];

    const tabsEl = document.getElementById("tabs");
    const widgetHolder = document.getElementById("widget-holder");
    const cityTitle = document.getElementById("city-title");
    const forecastLink = document.getElementById("forecast-link");

    function buildTabs() {
      cities.forEach((city, index) => {
        const btn = document.createElement("button");
        btn.className = "tab-button";
        btn.textContent = city.name;
        btn.type = "button";
        btn.addEventListener("click", () => renderCity(index));
        tabsEl.appendChild(btn);
      });
    }

    function setActiveTab(index) {
      const buttons = document.querySelectorAll(".tab-button");
      buttons.forEach((button, i) => {
        button.classList.toggle("active", i === index);
      });
    }

    function loadWeatherWidget(city) {
      widgetHolder.innerHTML = `
        <a
          class="weatherwidget-io"
          href="${city.url}"
          data-label_1="${city.name.toUpperCase()}"
          data-font="Arial"
          data-theme="pure">
          ${city.name.toUpperCase()}
        </a>
      `;

      const oldScript = document.getElementById("weatherwidget-io-js");
      if (oldScript) {
        oldScript.remove();
      }

      const script = document.createElement("script");
      script.id = "weatherwidget-io-js";
      script.src = "https://weatherwidget.io/js/widget.min.js";
      document.body.appendChild(script);
    }

    function renderCity(index) {
      const city = cities[index];
      cityTitle.textContent = city.name;
      forecastLink.href = city.url;
      setActiveTab(index);
      loadWeatherWidget(city);
    }

    buildTabs();
    renderCity(0);
  </script>
</body>
</html>
