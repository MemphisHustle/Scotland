<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scotland Weather</title>
  <style>
    body {
      margin: 0;
      padding: 8px;
      font-family: Arial, sans-serif;
      background: white;
      overflow-x: hidden;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      align-items: start;
    }

    .weather-card {
      padding: 0;
      margin: 0;
      line-height: 1;
      overflow: hidden;
      transform: scale(0.92);
      transform-origin: top left;
      width: 108%;
    }
  </style>
</head>
<body>
  <div class="weather-grid">
    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d95n3d19/edinburgh/?unit=us"
         data-label_1="EDINBURGH"
         data-label_2="WEATHER"
         data-days="5" 
         data-font="Arial"
         data-theme="pure">
         EDINBURGH WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d42n5d61/campbeltown/?unit=us"
         data-label_1="CAMPBELTOWN"
         data-label_2="WEATHER"
         data-days="5" 
         data-font="Arial"
         data-theme="pure">
         CAMPBELTOWN WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d58n5d15/brodick/?unit=us"
         data-label_1="BRODICK"
         data-label_2="WEATHER"
         data-days="5" 
         data-font="Arial"
         data-theme="pure">
         BRODICK WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/56d34n2d80/saint-andrews/?unit=us"
         data-label_1="ST ANDREWS"
         data-label_2="WEATHER"
         data-days="5" 
         data-font="Arial"
         data-theme="pure">
         ST ANDREWS WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/57d41n6d20/portree/?unit=us"
         data-label_1="PORTREE"
         data-label_2="WEATHER"
         data-days="5" 
         data-font="Arial"
         data-theme="pure">
         PORTREE WEATHER
      </a>
    </div>

    <div class="weather-card">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/57d48n4d22/inverness/?unit=us"
         data-label_1="INVERNESS"
         data-label_2="WEATHER"
         data-days="5" 
         data-font="Arial"
         data-theme="pure">
         INVERNESS WEATHER
      </a>
    </div>
  </div>

  <script>
    !function(d,s,id){
      var js,fjs=d.getElementsByTagName(s)[0];
      if(!d.getElementById(id)){
        js=d.createElement(s);
        js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
      }
    }(document,'script','weatherwidget-io-js');
  </script>
</body>
</html>
