<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scotland Weather Widgets</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .widget-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .city-widget {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <h1>Scotland Trip Weather</h1>

    <div class="city-widget">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d95n3d19/edinburgh/?unit=us"
         data-label_1="EDINBURGH"
         data-font="Arial"
         data-theme="pure">
         EDINBURGH
      </a>
    </div>

    <div class="city-widget">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d42n5d61/campbeltown/?unit=us"
         data-label_1="CAMPBELTOWN"
         data-font="Arial"
         data-theme="pure">
         CAMPBELTOWN
      </a>
    </div>

    <div class="city-widget">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/55d58n5d15/brodick/?unit=us"
         data-label_1="BRODICK"
         data-font="Arial"
         data-theme="pure">
         BRODICK
      </a>
    </div>

    <div class="city-widget">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/56d34n2d80/saint-andrews/?unit=us"
         data-label_1="ST ANDREWS"
         data-font="Arial"
         data-theme="pure">
         ST ANDREWS
      </a>
    </div>

    <div class="city-widget">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/57d41n6d20/portree/?unit=us"
         data-label_1="PORTREE"
         data-font="Arial"
         data-theme="pure">
         PORTREE
      </a>
    </div>

    <div class="city-widget">
      <a class="weatherwidget-io"
         href="https://forecast7.com/en/57d48n4d22/inverness/?unit=us"
         data-label_1="INVERNESS"
         data-font="Arial"
         data-theme="pure">
         INVERNESS
      </a>
    </div>
  </div>

  <script>
    !function(d,s,id){
      var js,fjs=d.getElementsByTagName(s)[0];
      if(!d.getElementById(id)){
        js=d.createElement(s);
        js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
      }
    }(document,'script','weatherwidget-io-js');
  </script>
</body>
</html>
